    :root {
        --brand: #2563EB;
        --brand-light: #3B82F6;

    body {
        transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dark body {
        background-color: var(--bg-dark);
        color: var(--text-dark);
    }

    .light body {
        background-color: var(--bg-light);
        color: var(--text-light);
    }

    .gradient-bg {
        background: linear-gradient(135deg, var(--gradient-1) 0%, var(--gradient-2) 100%);
        opacity: 0.15;
        filter: blur(80px);
        transform: translateZ(0);
    }

    .dark .gradient-bg {
        opacity: 0.25;
    }

    .glass {
        background: var(--glass-light);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--border-light);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    }

    .dark .glass {
        background: var(--glass-dark);
        border: 1px solid var(--border-dark);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .neumorphic-inset {
        box-shadow: inset 2px 2px 5px rgba(174, 174, 192, 0.4), 
                    inset -2px -2px 5px rgba(255, 255, 255, 0.7);
    }

    .dark .neumorphic-inset {
        box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5), 
                    inset -2px -2px 5px rgba(255, 255, 255, 0.05);
    }

    @keyframes logoFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }

        0% { opacity: 0; transform: scale(0.5) translateY(20px); }
        60% { opacity: 1; transform: scale(1.05) translateY(0); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

                   logoFloat 4s ease-in-out 1s infinite;

    .input-group {

        background: var(--input-bg-light);

    }

        background: var(--input-bg-dark);

    }

        position: absolute;

        pointer-events: none;

        color: #94A3B8;

    }

    .btn-ripple {
        position: relative;

    }

        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
    }

    .btn-ripple:active {
        transform: translateY(0);
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        transform: scale(0);
        animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

    /* Password Strength Meter */
    .strength-bar {
        height: 4px;
        background: #E2E8F0;
        border-radius: 2px;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .dark .strength-bar {
        background: #334155;
    }

    .strength-fill {
        height: 100%;
        width: 0%;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 2px;
    }

    .strength-weak { background: var(--error); width: 25%; }
    .strength-fair { background: var(--warning); width: 50%; }
    .strength-good { background: #3B82F6; width: 75%; }
    .strength-strong { background: var(--success); width: 100%; }

    /* Validation States */
    .input-valid {
        border-color: var(--success) !important;
    }

    .input-invalid {
        border-color: var(--error) !important;
        animation: shake 0.4s;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }

    }

    .validation-icon {
        position: absolute;

    }

    .validation-icon.show {
        transform: translateY(-50%) scale(1);
    }

    /* Theme Toggle */
    .theme-toggle {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-track {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-thumb {
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

        --glass-dark: rgba(17,25,40,0.75);
        --text-light: #0F172A;
        --text-dark: #F1F5F9;
        --border-light: rgba(255,255,255,0.4);
        --border-dark: rgba(255,255,255,0.125);
        --success: #10B981;
        --warning: #F59E0B;
        --error: #EF4444;
        --input-bg-light: rgba(255,255,255,0.6);
        --input-bg-dark: rgba(30,41,59,0.6);
    }

    * {
        font-family: 'Poppins', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dark body {
        background-color: var(--bg-dark);
        color: var(--text-dark);
    }

    .light body {
        background-color: var(--bg-light);
        color: var(--text-light);
    }

    .gradient-bg {
        background: linear-gradient(135deg, var(--gradient-1) 0%, var(--gradient-2) 100%);
        opacity: 0.15;
        filter: blur(80px);
        transform: translateZ(0);
    }

    .dark .gradient-bg {
        opacity: 0.25;
    }

    .glass {
        background: var(--glass-light);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--border-light);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    }

    .dark .glass {
        background: var(--glass-dark);
        border: 1px solid var(--border-dark);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .neumorphic-inset {
        box-shadow: inset 2px 2px 5px rgba(174, 174, 192, 0.4), 
                    inset -2px -2px 5px rgba(255, 255, 255, 0.7);
    }

    .dark .neumorphic-inset {
        box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5), 
                    inset -2px -2px 5px rgba(255, 255, 255, 0.05);
    }

    /* Logo Animation */
    @keyframes logoFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes logoFadeIn {
        0% { opacity: 0; transform: scale(0.5) translateY(20px); }
        60% { opacity: 1; transform: scale(1.05) translateY(0); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-animated {
        animation: logoFadeIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                   logoFloat 4s ease-in-out 1s infinite;
    }

    /* Input Floating Label */
    .input-group {
        position: relative;
    }

    .input-field {
        background: var(--input-bg-light);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dark .input-field {
        background: var(--input-bg-dark);
    }

    .input-field:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        transform: translateY(-2px);
    }

    .input-label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        color: #64748B;
    }

    .dark .input-label {
        color: #94A3B8;
    }

    .input-field:focus ~ .input-label,
    .input-field:not(:placeholder-shown) ~ .input-label {
        top: -10px;
        left: 12px;
        font-size: 0.75rem;
        padding: 0 4px;
        background: var(--glass-light);
        color: var(--brand);
        font-weight: 500;
    }

    .dark .input-field:focus ~ .input-label,
    .dark .input-field:not(:placeholder-shown) ~ .input-label {
        background: var(--bg-dark);
    }

    /* Button Ripple */
    .btn-ripple {
        position: relative;
        overflow: hidden;
        transform: translate3d(0, 0, 0);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-ripple:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
    }

    .btn-ripple:active {
        transform: translateY(0);
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        transform: scale(0);
        animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

    /* Password Strength Meter */
    .strength-bar {
        height: 4px;
        background: #E2E8F0;
        border-radius: 2px;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .dark .strength-bar {
        background: #334155;
    }

    .strength-fill {
        height: 100%;
        width: 0%;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 2px;
    }

    .strength-weak { background: var(--error); width: 25%; }
    .strength-fair { background: var(--warning); width: 50%; }
    .strength-good { background: #3B82F6; width: 75%; }
    .strength-strong { background: var(--success); width: 100%; }

    /* Validation States */
    .input-valid {
        border-color: var(--success) !important;
    }

    .input-invalid {
        border-color: var(--error) !important;
        animation: shake 0.4s;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
    }

    .validation-icon {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%) scale(0);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .validation-icon.show {
        transform: translateY(-50%) scale(1);
    }

    /* Theme Toggle */
    .theme-toggle {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-track {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-thumb {
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Fade In Up Animation */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
</style>
</head>

<script>
    // Theme Management
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    
    // Check system preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let currentTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
    
    function setTheme(theme) {
        if (theme === 'dark') {
            html.classList.add('dark');
            html.classList.remove('light');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        } else {
            html.classList.remove('dark');
            html.classList.add('light');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        }
        localStorage.setItem('theme', theme);
        currentTheme = theme;
    }
    
    setTheme(currentTheme);
    
    themeToggle.addEventListener('click', () => {
        setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });

    // Form Elements
    const form = document.getElementById('signupForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const referralInput = document.getElementById('referral');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    const emailIcon = document.getElementById('emailIcon');
    const confirmIcon = document.getElementById('confirmIcon');
    const emailError = document.getElementById('emailError');
    const confirmError = document.getElementById('confirmError');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    const togglePassword = document.getElementById('togglePassword');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    // Validation Icons
    const checkIcon = `<svg class="w-5 h-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;
    const xIcon = `<svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>`;

    // Email Validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    emailInput.addEventListener('input', () => {
        const value = emailInput.value.trim();
        if (value === '') {
            emailIcon.classList.remove('show');
            emailInput.classList.remove('input-valid', 'input-invalid');
            emailError.classList.add('hidden');
            return;
        }
        
        if (emailRegex.test(value)) {
            emailIcon.innerHTML = checkIcon;
            emailIcon.classList.add('show');
            emailInput.classList.add('input-valid');
            emailInput.classList.remove('input-invalid');
            emailError.classList.add('hidden');
        } else {
            emailIcon.innerHTML = xIcon;
            emailIcon.classList.add('show');
            emailInput.classList.add('input-invalid');
            emailInput.classList.remove('input-valid');
            emailError.textContent = 'Please enter a valid email address';
            emailError.classList.remove('hidden');
        }
    });

    // Password Strength Calculator
    function calculatePasswordStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.length >= 12) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;
        return strength;
    }

    passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;
        const strength = calculatePasswordStrength(password);
        
        strengthFill.className = 'strength-fill';
        
        if (password.length === 0) {
            strengthText.textContent = '';
            return;
        }
        
        if (strength <= 1) {
            strengthFill.classList.add('strength-weak');
            strengthText.textContent = 'Weak - Use longer password';
            strengthText.className = 'text-xs mt-1.5 ml-1 text-red-500';
        } else if (strength === 2) {
            strengthFill.classList.add('strength-fair');
            strengthText.textContent = 'Fair - Add uppercase, numbers';
            strengthText.className = 'text-xs mt-1.5 ml-1 text-amber-500';
        } else if (strength === 3) {
            strengthFill.classList.add('strength-good');
            strengthText.textContent = 'Good - Add special characters';
            strengthText.className = 'text-xs mt-1.5 ml-1 text-blue-500';
        } else {
            strengthFill.classList.add('strength-strong');
            strengthText.textContent = 'Strong password!';
            strengthText.className = 'text-xs mt-1.5 ml-1 text-emerald-500';
        }
        
        // Re-check confirm password
        if (confirmInput.value) {
            validateConfirmPassword();
        }
    });

    // Confirm Password Validation
    function validateConfirmPassword() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (confirm === '') {
            confirmIcon.classList.remove('show');
            confirmInput.classList.remove('input-valid', 'input-invalid');
            confirmError.classList.add('hidden');
            return false;
        }
        
        if (password === confirm) {
            confirmIcon.innerHTML = checkIcon;
            confirmIcon.classList.add('show');
            confirmInput.classList.add('input-valid');
            confirmInput.classList.remove('input-invalid');
            confirmError.classList.add('hidden');
            return true;
        } else {
            confirmIcon.innerHTML = xIcon;
            confirmIcon.classList.add('show');
            confirmInput.classList.add('input-invalid');
            confirmInput.classList.remove('input-valid');
            confirmError.textContent = 'Passwords do not match';
            confirmError.classList.remove('hidden');
            return false;
        }
    }

    confirmInput.addEventListener('input', validateConfirmPassword);

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        eyeOpen.classList.toggle('hidden');
        eyeClosed.classList.toggle('hidden');
    });

    // Button Ripple Effect
    submitBtn.addEventListener('click', function(e) {
        const button = e.currentTarget;
        const ripple = document.createElement('span');
        const rect = button.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.classList.add('ripple');
        
        button.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    });

    // Form Submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Validate all fields
        const emailValid = emailRegex.test(emailInput.value.trim());
        const passwordValid = passwordInput.value.length >= 8;
        const confirmValid = validateConfirmPassword();
        
        if (!emailValid || !passwordValid || !confirmValid) {
            if (!emailInput.value.trim()) {
                emailInput.classList.add('input-invalid');
                emailError.textContent = 'Email is required';
                emailError.classList.remove('hidden');
            }
            if (!passwordValid) {
                passwordInput.classList.add('input-invalid');
            }
            return;
        }
        
        // Simulate API call
        submitBtn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');
        
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // Success state
        btnSpinner.classList.add('hidden');
        btnText.textContent = 'Success! ✓';
        btnText.classList.remove('hidden');
        submitBtn.classList.remove('from-[#2563EB]', 'to-[#7C3AED]');
        submitBtn.classList.add('from-emerald-500', 'to-emerald-600');
        
        setTimeout(() => {
            alert('Account created successfully! Welcome to Codex.');
            form.reset();
            strengthFill.className = 'strength-fill';
            strengthText.textContent = '';
            emailIcon.classList.remove('show');
            confirmIcon.classList.remove('show');
            
            submitBtn.disabled = false;
            btnText.textContent = 'Sign up';
            submitBtn.classList.remove('from-emerald-500', 'to-emerald-600');
            submitBtn.classList.add('from-[#2563EB]', 'to-[#7C3AED]');
        }, 1500);
    });

    // Add smooth entrance for inputs on focus
    document.querySelectorAll('.input-field').forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.parentElement.style.transform = 'scale(1)';
        });
    });
</script>
